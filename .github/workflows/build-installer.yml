name: Build and Create Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the installer'
        required: false
        default: '1.0.0'
      build_configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release
      platform:
        description: 'Platform architecture'
        required: true
        default: 'x64'
        type: choice
        options:
          - x64
          - x86
          - ARM64
      create_release:
        description: 'Create GitHub release'
        required: true
        default: false
        type: boolean
      release_notes:
        description: 'Release notes (if creating release)'
        required: false
        default: 'Development build'


env:
  SOLUTION_PATH: './GAMINGCONSOLEMODE.sln'
  BUILD_PLATFORM: 'x64'
  DOTNET_VERSION: '8.0.x'
  WINDOWS_SDK_VERSION: '10.0.19041.0'
  INNO_SETUP_VERSION: '6.2.2'
  ISS_FILE: '.github/installer.iss'
  BUILD_OUTPUT_PATH: './build-output'  # Centralized build output directory

jobs:
  build-and-package:
    runs-on: windows-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact-name: ${{ steps.artifact-name.outputs.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check repository structure
        shell: pwsh
        run: |
          Write-Host "📂 Repository root contents:"
          Get-ChildItem -Path . | Select-Object Name, Mode | Format-Table
          
          Write-Host "`n📋 Looking for solution files:"
          $slnFiles = Get-ChildItem -Path . -Filter "*.sln" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 5
          if ($slnFiles) {
            foreach ($sln in $slnFiles) {
              Write-Host "  Found: $($sln.FullName.Replace($PWD, '.'))"
            }
          } else {
            Write-Warning "No .sln files found!"
          }
          
          Write-Host "`n📁 Looking for project files:"
          $projFiles = Get-ChildItem -Path . -Filter "*.csproj" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 10
          if ($projFiles) {
            foreach ($proj in $projFiles) {
              Write-Host "  Found: $($proj.FullName.Replace($PWD, '.'))"
            }
          } else {
            Write-Warning "No .csproj files found!"
          }

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $baseVersion = "${{ github.event.inputs.version }}"
          
          # Add build number for development builds
          if ("${{ github.event.inputs.create_release }}" -eq "false") {
            $version = "${baseVersion}-dev.${{ github.run_number }}"
          } else {
            $version = $baseVersion
          }
          
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "🏷️ Building version: $version"
          echo "🔧 Configuration: ${{ github.event.inputs.build_configuration }}"
          echo "🖥️ Platform: ${{ github.event.inputs.platform }}"
          echo "📦 Create Release: ${{ github.event.inputs.create_release }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install .NET Workloads
        shell: pwsh
        run: |
          # Install required workloads for WinUI3/Windows App SDK
          Write-Host "📦 Installing .NET workloads..."
          
          # Install Windows development workload
          dotnet workload install maui-windows
          
          Write-Host "✅ .NET workloads installed"

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: |
          dotnet restore ${{ env.SOLUTION_PATH }} `
            --verbosity normal

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        shell: pwsh
        run: |
          $platform = "${{ github.event.inputs.platform }}"
          $outputPath = "${{ env.BUILD_OUTPUT_PATH }}/${{ github.event.inputs.build_configuration }}/$platform"
          
          # Create output directory
          New-Item -ItemType Directory -Force -Path $outputPath | Out-Null
          
          Write-Host "🔨 Building solution to centralized directory: $outputPath"
          
          # Build using MSBuild with centralized output directory
          msbuild ${{ env.SOLUTION_PATH }} `
            /p:Configuration=${{ github.event.inputs.build_configuration }} `
            /p:Platform="$platform" `
            /p:OutputPath="$(Resolve-Path $outputPath)" `
            /p:OutDir="$(Resolve-Path $outputPath)\" `
            /p:Version=${{ steps.version.outputs.version }} `
            /p:AssemblyVersion=${{ github.event.inputs.version }}.0 `
            /p:FileVersion=${{ github.event.inputs.version }}.0 `
            /p:PublishReadyToRun=false `
            /p:PublishSingleFile=false `
            /p:WindowsPackageType=None `
            /p:WindowsAppSDKSelfContained=true `
            /restore `
            /m `
            /v:m
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Build failed with exit code: $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          
          Write-Host "✅ Build completed successfully"
          Write-Host "`n📁 Build output directory contents:"
          Get-ChildItem -Path $outputPath -Name | ForEach-Object { Write-Host "   - $_" }

      - name: Run tests (optional)
        if: github.event.inputs.build_configuration == 'Release'
        continue-on-error: true
        run: |
          dotnet test ${{ env.SOLUTION_PATH }} `
            --configuration ${{ github.event.inputs.build_configuration }} `
            --no-build `
            --verbosity normal `
            --logger "trx;LogFileName=test-results.trx"

      - name: Prepare GCM build outputs
        shell: pwsh
        run: |
          # Create directory for installer files
          New-Item -ItemType Directory -Force -Path "./installer-files"
          
          $config = "${{ github.event.inputs.build_configuration }}"
          $platform = "${{ github.event.inputs.platform }}"
          $sourcePath = "${{ env.BUILD_OUTPUT_PATH }}/$config/$platform"
          
          Write-Host "📦 Collecting all build outputs from centralized directory: $sourcePath"
          
          if (Test-Path $sourcePath) {
            # Copy all files from the centralized build output
            Copy-Item -Path "$sourcePath/*" -Destination "./installer-files/" -Recurse -Force
          
            Write-Host "✅ Copied all build outputs from centralized directory"
          
            # List what was copied
            Write-Host "`n📁 Installer files content:"
            $files = Get-ChildItem -Path "./installer-files" -File | Select-Object -First 20
            foreach ($file in $files) {
              Write-Host "  - $($file.Name)"
            }
          
            if ((Get-ChildItem -Path "./installer-files" -File).Count -gt 20) {
              Write-Host "  ... and $((Get-ChildItem -Path './installer-files' -File).Count - 20) more files"
            }
          
            # Show executables found
            Write-Host "`n🚀 Executables found:"
            Get-ChildItem -Path "./installer-files" -Filter "*.exe" | ForEach-Object {
              Write-Host "  - $($_.Name)"
            }
          
            # Check for required components
            $requiredExes = @("GAMINGCONSOLEMODE.exe", "gcmloader.exe")
            $missingExes = @()
          
            foreach ($exe in $requiredExes) {
              if (-not (Test-Path "./installer-files/$exe")) {
                $missingExes += $exe
              }
            }
          
            if ($missingExes.Count -gt 0) {
              Write-Warning "⚠️ Some expected executables were not found:"
              foreach ($exe in $missingExes) {
                Write-Warning "   - $exe"
              }
            } else {
              Write-Host "✅ All required components found"
            }
          
          } else {
            Write-Error "❌ Build output directory not found: $sourcePath"
            Write-Error "Available directories:"
            Get-ChildItem -Path "${{ env.BUILD_OUTPUT_PATH }}" -Directory -Recurse -ErrorAction SilentlyContinue | ForEach-Object {
              Write-Host "  - $($_.FullName.Replace($PWD, '.'))"
            }
            exit 1
          }
          
          # Copy logo.ico if it exists (check multiple locations)
          $logoSearchPaths = @(
            "$sourcePath/logo.ico",
            "$sourcePath/gcmloader/logo.ico",
            "./gcmloader/logo.ico",
            "./logo.ico",
            "./Resources/logo.ico"
          )
          
          $logoFound = $false
          foreach ($path in $logoSearchPaths) {
            if (Test-Path $path) {
              # Create gcmloader subdirectory for the logo if needed
              if (-not (Test-Path "./installer-files/gcmloader")) {
                New-Item -ItemType Directory -Force -Path "./installer-files/gcmloader" | Out-Null
              }
              Copy-Item -Path $path -Destination "./installer-files/gcmloader/logo.ico" -Force
              Write-Host "✅ Copied logo.ico from: $path"
              $logoFound = $true
              break
            }
          }
          
          if (-not $logoFound) {
            Write-Warning "⚠️ logo.ico not found in any expected location"
          }
          
          # Show total size
          $totalSize = (Get-ChildItem -Path "./installer-files" -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "`n💾 Total installer content size: $([math]::Round($totalSize, 2)) MB"

      - name: Download and install Inno Setup
        shell: pwsh
        run: |
          $innoVersion = "${{ env.INNO_SETUP_VERSION }}"
          $url = "https://files.jrsoftware.org/is/6/innosetup-$innoVersion.exe"
          $installerPath = "$env:TEMP\innosetup.exe"
          
          Write-Host "📥 Downloading Inno Setup $innoVersion..."
          Invoke-WebRequest -Uri $url -OutFile $installerPath
          
          Write-Host "📦 Installing Inno Setup..."
          Start-Process -FilePath $installerPath -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-" -Wait
          
          # Add Inno Setup to PATH
          $innoPath = "${env:ProgramFiles(x86)}\Inno Setup 6"
          echo "$innoPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "INNO_PATH=$innoPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Update version in ISS file
        shell: pwsh
        run: |
          $issPath = "${{ env.ISS_FILE }}"
          $version = "${{ steps.version.outputs.version }}"
          
          if (Test-Path $issPath) {
            $content = Get-Content $issPath -Raw
          
            # Update the version define
            if ($content -match '#define MyAppVersion ".*"') {
              $content = $content -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`""
            } else {
              # If no define exists, add it at the beginning
              $content = "#define MyAppVersion `"$version`"`n" + $content
            }
          
            Set-Content -Path $issPath -Value $content -Encoding UTF8
            Write-Host "✅ Updated ISS file with version $version"
          
            # Display first few lines for verification
            Write-Host "`n📄 ISS file header:"
            Get-Content $issPath -First 5 | ForEach-Object { Write-Host "  $_" }
          } else {
            Write-Error "ISS file not found at: $issPath"
            exit 1
          }

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          echo 🔨 Building GCM installer...
          "%INNO_PATH%\ISCC.exe" /Q /O"./output" "${{ env.ISS_FILE }}"
          echo.
          echo ✅ Installer build complete!
          echo.
          echo 📦 Generated files:
          dir /B output\*.exe

      - name: Generate artifact name
        id: artifact-name
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $config = "${{ github.event.inputs.build_configuration }}".ToLower()
          $name = "GCM-installer-${{ steps.version.outputs.version }}-$config-$shortSha"
          echo "name=$name" >> $env:GITHUB_OUTPUT
          Write-Host "📦 Artifact name: $name"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: ./output/GCM-Setup-*.exe
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.event.inputs.build_configuration }}-${{ github.sha }}
          path: |
            **/*.log
            **/*.trx
          retention-days: 7

      - name: Build Summary
        if: always()
        shell: pwsh
        run: |
          Write-Host "`n" 
          Write-Host "========================================" 
          Write-Host "         BUILD SUMMARY" 
          Write-Host "========================================" 
          Write-Host "Version:        ${{ steps.version.outputs.version }}"
          Write-Host "Configuration:  ${{ github.event.inputs.build_configuration }}"
          Write-Host "Platform:       ${{ github.event.inputs.platform }}"
          Write-Host "Artifact:       ${{ steps.artifact-name.outputs.name }}"
          Write-Host "Build Number:   ${{ github.run_number }}"
          Write-Host "Commit:         ${{ github.sha }}"
          Write-Host "========================================" 

  create-release:
    needs: build-and-package
    runs-on: ubuntu-latest
    if: github.event.inputs.create_release == 'true'
    
    permissions:
      contents: write
    
    steps:
      - name: Download installer artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-package.outputs.artifact-name }}
          path: ./installer

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build-and-package.outputs.version }}
          name: GCM Release ${{ needs.build-and-package.outputs.version }}
          draft: true  # Create as draft for manual review
          prerelease: ${{ contains(needs.build-and-package.outputs.version, '-dev') }}
          files: ./installer/GCM-Setup-*.exe
          body: |
            ## GCM Game Console Mode v${{ needs.build-and-package.outputs.version }}
            
            ### 📝 Release Notes
            ${{ github.event.inputs.release_notes }}
            
            ### 🎮 What's New
            - Built from commit: ${{ github.sha }}
            - Build number: ${{ github.run_number }}
            - Configuration: ${{ github.event.inputs.build_configuration }}
            - Platform: ${{ github.event.inputs.platform }}
            
            ### 📥 Installation
            1. Download the installer below
            2. Run as Administrator
            3. The installer will automatically remove any old GCM versions
            
            ### 💻 System Requirements
            - Windows 10 or later (x86/x64)
            - .NET Runtime ${{ env.DOTNET_VERSION }}
            - Administrator privileges for installation
            
            ### 🚀 Components Included
            - GCM Settings (GAMINGCONSOLEMODE.exe)
            - GCM Loader (gcmloader.exe)
            - WinGamepad
            - Overlay Window
            - Flow Launcher
            
            ### ⚠️ Note
            The installer will automatically:
            - Stop all running GCM processes
            - Remove old GCMcrew installations
            - Clean up AppData settings from previous versions
          generate_release_notes: false