name: Build and Create Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the installer'
        required: false
        default: '1.0.0'
      build_configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release
      platform:
        description: 'Platform architecture'
        required: true
        default: 'x64'
        type: choice
        options:
          - x64
          - x86
          - ARM64
      create_release:
        description: 'Create GitHub release'
        required: true
        default: false
        type: boolean
      release_notes:
        description: 'Release notes (if creating release)'
        required: false
        default: 'Development build'

env:
  SOLUTION_PATH: './GAMINGCONSOLEMODE.sln'
  DOTNET_VERSION: '8.0.x'
  INNO_SETUP_VERSION: '6.2.2'
  ISS_FILE: '.github/installer.iss'
  # Performance optimizations
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  MSBUILD_VERBOSITY: minimal

jobs:
  build-and-package:
    runs-on: windows-2022
    timeout-minutes: 30
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact-name: ${{ steps.artifact-name.outputs.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # VERBESSERT: Cache für .NET-Pakete, Tools UND Workloads
      - name: Cache .NET
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/tools
            C:\Program Files\dotnet\sdk-manifests
            C:\Program Files\dotnet\packs
            C:\Program Files\dotnet\shared
          key: ${{ runner.os }}-dotnet-${{ env.DOTNET_VERSION }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-${{ env.DOTNET_VERSION }}-

      - name: Cache Inno Setup
        id: cache-inno
        uses: actions/cache@v4
        with:
          path: ${{ env.ProgramFiles(x86) }}\Inno Setup 6
          key: inno-setup-${{ env.INNO_SETUP_VERSION }}

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $baseVersion = "${{ github.event.inputs.version }}"
          if ("${{ github.event.inputs.create_release }}" -eq "false") {
            $version = "${baseVersion}-dev.${{ github.run_number }}"
          } else {
            $version = $baseVersion
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "🏷️ Version: $version | Config: ${{ github.event.inputs.build_configuration }} | Platform: ${{ github.event.inputs.platform }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install .NET Workloads
        shell: pwsh
        run: |
          Write-Host "📦 Installing .NET workloads..."
          dotnet workload install maui-windows --skip-sign-check
          Write-Host "✅ Workloads installed"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # VERBESSERT: dotnet publish ohne SingleFile
      - name: Build and Publish Projects
        shell: pwsh
        run: |
          $platform = "${{ github.event.inputs.platform }}"
          $config = "${{ github.event.inputs.build_configuration }}"
          $runtimeId = "win-$($platform.ToLower())"
          
          Write-Host "🔨 Building and publishing projects..."
          
          $projects = @(
            "GAMINGCONSOLEMODE",
            "gcmloader",
            "OverlayWindow",
            "wingamepad"
          )
          
          Write-Host "📦 Restoring solution packages..."
          dotnet restore ${{ env.SOLUTION_PATH }} --verbosity minimal
          if ($LASTEXITCODE -ne 0) { throw "Solution restore failed!" }
          
          foreach ($projectName in $projects) {
            $projectPath = "./$projectName/$projectName.csproj"
            Write-Host "`n📦 Publishing $projectName..."
            if (-not (Test-Path $projectPath)) {
              Write-Warning "⚠️ Project file not found: $projectPath"; continue
            }
            
            # HINWEIS: /p:PublishSingleFile=true wurde entfernt, um .exe + .dlls zu erhalten
            dotnet publish $projectPath `
              --configuration $config `
              --runtime $runtimeId `
              --self-contained true `
              --verbosity minimal `
              /p:Version=${{ steps.version.outputs.version }} `
              /p:AssemblyVersion=${{ github.event.inputs.version }}.0 `
              /p:FileVersion=${{ github.event.inputs.version }}.0 `
              /p:WindowsPackageType=None `
              /p:WindowsAppSDKSelfContained=true
            
            if ($LASTEXITCODE -ne 0) { throw "$projectName publish failed!" }
            Write-Host "  ✅ $projectName published successfully"
          }
          Write-Host "`n✅ All projects built/published successfully"

      # VERBESSERT: Robusteres Skript zum Vorbereiten der Dateien
      - name: Prepare installer files
        shell: pwsh
        run: |
          Write-Host "📦 Preparing installer files..."
          New-Item -ItemType Directory -Force -Path "./installer-files"
          
          $config = "${{ github.event.inputs.build_configuration }}"
          
          $projects = @{
            "GAMINGCONSOLEMODE" = @{ "targetFolder" = "." }
            "gcmloader" = @{ "targetFolder" = "gcmloader" }
            "OverlayWindow" = @{ "targetFolder" = "OverlayWindow" }
            "wingamepad" = @{ "targetFolder" = "wingamepad" }
          }
          
          foreach ($projectName in $projects.Keys) {
            $project = $projects[$projectName]
            $searchPath = "./$projectName/bin/$config"
            
            Write-Host "`n📍 Processing $projectName..."
            # Sucht dynamisch nach dem 'publish'-Ordner
            $publishDir = Get-ChildItem -Path $searchPath -Directory -Recurse | Where-Object { $_.Name -eq 'publish' } | Select-Object -First 1
            
            if ($publishDir) {
              Write-Host "  ✅ Found publish directory at: $($publishDir.FullName)"
              $targetPath = if ($project.targetFolder -eq ".") { "./installer-files" } else { "./installer-files/$($project.targetFolder)" }
              New-Item -ItemType Directory -Force -Path $targetPath | Out-Null
              
              Write-Host "  📦 Copying all published files to '$targetPath'..."
              Copy-Item -Path "$($publishDir.FullName)/*" -Destination $targetPath -Recurse -Force
              Write-Host "  📊 Copied $(@(Get-ChildItem -Path $targetPath -Recurse).Count) files."
            } else {
              Write-Warning "  ❌ Could not find the publish directory for project $projectName."
            }
          }
          
          Write-Host "`n🎨 Looking for logo.ico..."
          $logoSource = Get-ChildItem -Path "./gcmloader/", "./" -Filter "logo.ico" -Recurse | Select-Object -First 1
          if ($logoSource) {
            $logoDest = "./installer-files/gcmloader/logo.ico"
            New-Item -ItemType File -Path $logoDest -Force | Out-Null
            Copy-Item -Path $logoSource.FullName -Destination $logoDest
            Write-Host "✅ Logo copied from $($logoSource.FullName)"
          } else {
            Write-Warning "⚠️ logo.ico not found."
          }

          Write-Host "`n📁 Final installer structure preview:"
          Get-ChildItem -Path ./installer-files -Recurse | ForEach-Object { Write-Host "  $($_.FullName.Replace($PWD.Path, ''))" }

      - name: Install Inno Setup
        if: steps.cache-inno.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Write-Host "📥 Downloading Inno Setup ${{ env.INNO_SETUP_VERSION }}..."
          Invoke-WebRequest -Uri "https://files.jrsoftware.org/is/6/innosetup-${{ env.INNO_SETUP_VERSION }}.exe" -OutFile "$env:TEMP\innosetup.exe"
          Write-Host "📦 Installing Inno Setup..."
          Start-Process -FilePath "$env:TEMP\innosetup.exe" -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-" -Wait

      - name: Setup Inno Setup PATH
        shell: pwsh
        run: |
          $innoPath = "${env:ProgramFiles(x86)}\Inno Setup 6"
          echo "$innoPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "INNO_PATH=$innoPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Update ISS file version
        shell: pwsh
        run: |
          $issPath = "${{ env.ISS_FILE }}"
          $version = "${{ steps.version.outputs.version }}"
          if (-not (Test-Path $issPath)) { throw "ISS file not found: $issPath" }
          $content = Get-Content $issPath -Raw
          $newDefine = "#define MyAppVersion `"$version`""
          if ($content -match '#define MyAppVersion ".*"') {
            $content = $content -replace '#define MyAppVersion ".*"', $newDefine
          } else {
            $content = "$newDefine`n" + $content
          }
          $utf8NoBom = New-Object System.Text.UTF8Encoding $false
          [System.IO.File]::WriteAllText($issPath, $content, $utf8NoBom)
          Write-Host "✅ Updated ISS file with version $version"

      # VERBESSERT: Umstellung auf PowerShell für Konsistenz
      - name: Build installer
        shell: pwsh
        run: |
          Write-Host "🔨 Building GCM installer..."
          & "${env:INNO_PATH}\ISCC.exe" /Q /O"./output" "${{ env.ISS_FILE }}"
          if ($LASTEXITCODE -ne 0) { throw "❌ Installer build failed!" }
          Write-Host "✅ Installer build complete!"

      - name: Generate artifact name
        id: artifact-name
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $config = "${{ github.event.inputs.build_configuration }}".ToLower()
          $name = "GCM-installer-${{ steps.version.outputs.version }}-$config-$shortSha"
          echo "name=$name" >> $env:GITHUB_OUTPUT
          Write-Host "📦 Artifact name: $name"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: ./output/*.exe

  create-release:
    needs: build-and-package
    runs-on: ubuntu-latest
    if: github.event.inputs.create_release == 'true'
    permissions:
      contents: write
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-package.outputs.artifact-name }}
          path: ./installer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.build-and-package.outputs.version }}
          name: GCM Release ${{ needs.build-and-package.outputs.version }}
          draft: true
          prerelease: ${{ contains(needs.build-and-package.outputs.version, '-dev') }}
          files: ./installer/*.exe
          body: |
            ## 🎮 GCM Game Console Mode v${{ needs.build-and-package.outputs.version }}
            
            ### 📝 Release Notes
            ${{ github.event.inputs.release_notes }}
            
            ### 🔧 Build Information
            - **Built from:** `${{ github.sha }}`
            - **Build number:** `${{ github.run_number }}`
            - **Configuration:** ${{ github.event.inputs.build_configuration }}
            - **Platform:** ${{ github.event.inputs.platform }}
            
            ### 📥 Installation Instructions
            1. **Download** the installer below.
            2. **Run as Administrator** (required for shell replacement).
            3. The installer will automatically remove old versions.
            4. Launch **GCM Settings** to configure your setup.
            
            ### 💻 System Requirements
            - Windows 10 (1903+) or Windows 11
            - Administrator privileges
            - 100MB+ free disk space
            
            ### 🚀 What's Included
            - **GCM Settings** - Configuration interface
            - **GCM Loader** - Console mode launcher  
            - **Controller Support** - Xbox/Generic gamepad support
            - **Audio Switching** - Automatic audio device management
            - **Flow Launcher** - Keyboard-driven app launcher
            
            ### ⚠️ Important Notes
            - **Backup your data** before installation.
            - The installer **disables UAC** temporarily in gaming mode.
            - **Steam/Playnite integration** requires additional setup.
            - Use at your own risk - this modifies Windows shell behavior.
            
            ---
            
            💬 **Need help?** Join our [Discord](https://discord.gg/xGD2GV6zS2) or check [GitHub Issues](https://github.com/toonymak1993/GameConsoleMode/issues).
          generate_release_notes: false
