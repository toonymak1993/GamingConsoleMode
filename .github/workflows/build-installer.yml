name: Build and Create Installer

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the installer'
        required: false
        default: '1.0.0'
      build_configuration:
        description: 'Build configuration'
        required: true
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release
      platform:
        description: 'Platform architecture'
        required: true
        default: 'x64'
        type: choice
        options:
          - x64
          - x86
          - ARM64
      create_release:
        description: 'Create GitHub release'
        required: true
        default: false
        type: boolean
      release_notes:
        description: 'Release notes (if creating release)'
        required: false
        default: 'Development build'

env:
  SOLUTION_PATH: './GAMINGCONSOLEMODE.sln'
  DOTNET_VERSION: '8.0.x'
  WINDOWS_SDK_VERSION: '10.0.19041.0'
  INNO_SETUP_VERSION: '6.2.2'
  ISS_FILE: '.github/installer.iss'
  BUILD_OUTPUT_PATH: './build-output'
  # Performance optimizations
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  MSBUILD_VERBOSITY: minimal

jobs:
  build-and-package:
    runs-on: windows-2022  # Latest and fastest Windows runner
    timeout-minutes: 30    # Prevent runaway builds
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact-name: ${{ steps.artifact-name.outputs.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Shallow clone for speed unless you need full history

      # Cache .NET packages and tools for significant speed improvement
      - name: Cache .NET packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-

      # Cache Inno Setup to avoid downloading every time
      - name: Cache Inno Setup
        id: cache-inno
        uses: actions/cache@v4
        with:
          path: ${env:ProgramFiles(x86)}\Inno Setup 6
          key: inno-setup-${{ env.INNO_SETUP_VERSION }}

      - name: Check repository structure
        shell: pwsh
        run: |
          Write-Host "📂 Repository root contents:"
          Get-ChildItem -Path . -Name | Select-Object -First 10 | ForEach-Object { Write-Host "  - $_" }
          
          # Quick check for essential files
          $essentialFiles = @("*.sln", "*.csproj")
          foreach ($pattern in $essentialFiles) {
            $files = Get-ChildItem -Path . -Filter $pattern -Recurse | Select-Object -First 3
            if ($files) {
              Write-Host "✅ Found $pattern files"
            } else {
              Write-Warning "⚠️ No $pattern files found"
            }
          }

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $baseVersion = "${{ github.event.inputs.version }}"
          
          if ("${{ github.event.inputs.create_release }}" -eq "false") {
            $version = "${baseVersion}-dev.${{ github.run_number }}"
          } else {
            $version = $baseVersion
          }
          
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "🏷️ Version: $version | Config: ${{ github.event.inputs.build_configuration }} | Platform: ${{ github.event.inputs.platform }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Only install workloads if not cached or on first run
      - name: Install .NET Workloads
        shell: pwsh
        run: |
          Write-Host "📦 Installing .NET workloads..."
          dotnet workload install maui-windows --skip-sign-check
          Write-Host "✅ Workloads installed"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Combine restore and build for better performance
      - name: Restore and Build solution
        shell: pwsh
        run: |
          $platform = "${{ github.event.inputs.platform }}"
          $config = "${{ github.event.inputs.build_configuration }}"
          $outputPath = "${{ env.BUILD_OUTPUT_PATH }}/$config/$platform"
          
          New-Item -ItemType Directory -Force -Path $outputPath | Out-Null
          
          Write-Host "🔨 Building solution..."
          
          # Single MSBuild command with restore for better performance
          msbuild ${{ env.SOLUTION_PATH }} `
            /p:Configuration=$config `
            /p:Platform="$platform" `
            /p:OutputPath="$(Resolve-Path $outputPath)" `
            /p:OutDir="$(Resolve-Path $outputPath)\" `
            /p:Version=${{ steps.version.outputs.version }} `
            /p:AssemblyVersion=${{ github.event.inputs.version }}.0 `
            /p:FileVersion=${{ github.event.inputs.version }}.0 `
            /p:PublishReadyToRun=false `
            /p:PublishSingleFile=false `
            /p:WindowsPackageType=None `
            /p:WindowsAppSDKSelfContained=true `
            /restore `
            /maxcpucount `
            /verbosity:${{ env.MSBUILD_VERBOSITY }} `
            /nodeReuse:true
          
          if ($LASTEXITCODE -ne 0) {
            throw "Build failed with exit code: $LASTEXITCODE"
          }
          
          Write-Host "✅ Build completed"

      # Only run tests for Release builds and make them non-blocking
      - name: Run tests
        if: github.event.inputs.build_configuration == 'Release'
        continue-on-error: true
        run: |
          dotnet test ${{ env.SOLUTION_PATH }} `
            --configuration ${{ github.event.inputs.build_configuration }} `
            --no-build `
            --no-restore `
            --verbosity minimal `
            --logger "trx;LogFileName=test-results.trx" `
            --collect:"XPlat Code Coverage"

      - name: Prepare installer files
        shell: pwsh
        run: |
          Write-Host "📦 Preparing installer files with precise file selection..."
          New-Item -ItemType Directory -Force -Path "./installer-files"
          
          # Define the target projects and their expected executables
          $projects = @{
            "GAMINGCONSOLEMODE" = @{
              "exe" = "GAMINGCONSOLEMODE.exe"
              "targetFolder" = "."  # Root directory
              "description" = "Main Settings App"
            }
            "gcmloader" = @{
              "exe" = "gcmloader.exe" 
              "targetFolder" = "gcmloader"
              "description" = "GCM Loader"
            }
            "OverlayWindow" = @{
              "exe" = "OverlayWindow.exe"
              "targetFolder" = "OverlayWindow" 
              "description" = "Overlay Window"
            }
            "wingamepad" = @{
              "exe" = "wingamepad.exe"
              "targetFolder" = "wingamepad"
              "description" = "Wing Gamepad"
            }
          }
          
          # First, find where all the executables are located
          Write-Host "🔍 Locating all project executables..."
          $buildOutputDir = $null
          $allExecutables = @{}
          
          foreach ($projectName in $projects.Keys) {
            $exeName = $projects[$projectName].exe
            $exeFound = Get-ChildItem -Path "." -Filter $exeName -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          
            if ($exeFound) {
              $sourceDir = $exeFound.Directory.FullName
              $allExecutables[$projectName] = $exeFound.FullName
          
              if ($buildOutputDir -eq $null) {
                $buildOutputDir = $sourceDir
              }
          
              Write-Host "  ✅ $exeName found at: $($sourceDir.Replace((Get-Location).Path, '.'))"
            } else {
              Write-Host "  ❌ $exeName not found"
            }
          }
          
          if ($buildOutputDir -eq $null) {
            throw "No executables found - build may have failed"
          }
          
          Write-Host "`n📂 Build output directory: $($buildOutputDir.Replace((Get-Location).Path, '.'))"
          
          # Get all files in the build directory for analysis
          $allFiles = Get-ChildItem -Path $buildOutputDir -File -ErrorAction SilentlyContinue
          Write-Host "📊 Total files in build output: $($allFiles.Count)"
          
          # Process each project with precise file matching
          $foundProjects = @()
          $missingProjects = @()
          
          foreach ($projectName in $projects.Keys) {
            $project = $projects[$projectName]
          
            if ($allExecutables.ContainsKey($projectName)) {
              $foundProjects += $projectName
              Write-Host "`n📦 Processing $($project.description)..."
          
              # Create target directory
              if ($project.targetFolder -ne ".") {
                $targetPath = Join-Path "./installer-files" $project.targetFolder
                New-Item -ItemType Directory -Force -Path $targetPath | Out-Null
              } else {
                $targetPath = "./installer-files"
              }
          
              # Copy files that belong to this project
              $copiedFiles = 0
          
              foreach ($file in $allFiles) {
                $shouldCopy = $false
                $reason = ""
          
                # Main executable - exact match
                if ($file.Name -eq $project.exe) {
                  $shouldCopy = $true
                  $reason = "main executable"
                }
                # Project-specific DLLs - must start with project name
                elseif ($file.Extension -eq ".dll" -and $file.BaseName -eq $projectName) {
                  $shouldCopy = $true
                  $reason = "project DLL"
                }
                # Project-specific config/json files - must match project name exactly
                elseif (($file.Extension -eq ".json" -or $file.Extension -eq ".config") -and 
                        ($file.BaseName -eq $projectName -or $file.Name -like "$projectName.*")) {
                  $shouldCopy = $true
                  $reason = "project config"
                }
                # Project-specific debug files
                elseif ($file.Extension -eq ".pdb" -and $file.BaseName -eq $projectName) {
                  $shouldCopy = $true
                  $reason = "debug symbols"
                }
          
                # For the main app only - copy shared/common dependencies
                if ($project.targetFolder -eq "." -and -not $shouldCopy) {
                  # Include common .NET runtime files and shared libraries
                  if ($file.Extension -eq ".dll" -and -not $file.BaseName.StartsWith("GAMINGCONSOLEMODE") -and
                      -not $file.BaseName.StartsWith("gcmloader") -and -not $file.BaseName.StartsWith("OverlayWindow") -and
                      -not $file.BaseName.StartsWith("wingamepad")) {
                    $shouldCopy = $true
                    $reason = "shared dependency"
                  }
                  # Common config files
                  elseif ($file.Extension -eq ".json" -and ($file.Name -like "*.runtimeconfig.json" -or $file.Name -like "*.deps.json") -and
                          -not $file.BaseName.StartsWith("gcmloader") -and -not $file.BaseName.StartsWith("OverlayWindow") -and
                          -not $file.BaseName.StartsWith("wingamepad")) {
                    $shouldCopy = $true
                    $reason = "runtime config"
                  }
                }
          
                if ($shouldCopy) {
                  Copy-Item -Path $file.FullName -Destination $targetPath -Force -ErrorAction SilentlyContinue
                  Write-Host "    ✓ $($file.Name) ($reason)"
                  $copiedFiles++
                }
              }
          
              Write-Host "  📊 Copied $copiedFiles files for $projectName"
          
              # Verify the main executable exists in target
              $targetExePath = if ($project.targetFolder -eq ".") { 
                Join-Path "./installer-files" $project.exe
              } else { 
                Join-Path "./installer-files" $project.targetFolder $project.exe
              }
          
              if (Test-Path $targetExePath) {
                Write-Host "  ✅ $($project.exe) verified in target location"
              } else {
                Write-Warning "  ⚠️ $($project.exe) missing from target location"
              }
          
            } else {
              $missingProjects += $projectName
            }
          }
          
          # Handle logo.ico for gcmloader
          Write-Host "`n🎨 Looking for logo.ico..."
          $logoSearchPaths = @(
            "./gcmloader/logo.ico",
            "./logo.ico", 
            "./Resources/logo.ico"
          )
          
          $logoFound = $false
          foreach ($path in $logoSearchPaths) {
            if (Test-Path $path) {
              $gcmloaderDir = "./installer-files/gcmloader"
              if (-not (Test-Path $gcmloaderDir)) {
                New-Item -ItemType Directory -Force -Path $gcmloaderDir | Out-Null
              }
              Copy-Item -Path $path -Destination "$gcmloaderDir/logo.ico" -Force
              Write-Host "✅ Logo copied from: $path"
              $logoFound = $true
              break
            }
          }
          
          if (-not $logoFound) {
            Write-Warning "⚠️ logo.ico not found"
          }
          
          # Final summary and structure validation
          Write-Host "`n📋 Processing Summary:"
          Write-Host "  ✅ Found projects: $($foundProjects -join ', ')"
          if ($missingProjects.Count -gt 0) {
            Write-Host "  ❌ Missing projects: $($missingProjects -join ', ')"
          }
          
          Write-Host "`n📁 Final installer structure:"
          
          # Root files
          $rootFiles = Get-ChildItem -Path "./installer-files" -File
          if ($rootFiles.Count -gt 0) {
            Write-Host "  📂 Root (./installer-files/):"
            foreach ($file in $rootFiles | Sort-Object Name) {
              Write-Host "    - $($file.Name)"
            }
          }
          
          # Subdirectory files
          $subdirs = Get-ChildItem -Path "./installer-files" -Directory
          foreach ($subdir in $subdirs | Sort-Object Name) {
            Write-Host "  📂 $($subdir.Name)/:"
            $subdirFiles = Get-ChildItem -Path $subdir.FullName -File | Sort-Object Name
            foreach ($file in $subdirFiles) {
              Write-Host "    - $($file.Name)"
            }
            if ($subdirFiles.Count -eq 0) {
              Write-Host "    (empty)"
            }
          }
          
          # Validation
          $criticalCheck = @(
            @{ Path = "./installer-files/GAMINGCONSOLEMODE.exe"; Name = "Main Settings App" }
          )
          
          foreach ($check in $criticalCheck) {
            if (Test-Path $check.Path) {
              Write-Host "`n✅ $($check.Name) is ready"
            } else {
              Write-Warning "`n⚠️ $($check.Name) is missing"
            }
          }
          
          # Final size calculation
          $totalSize = (Get-ChildItem -Path "./installer-files" -Recurse -File | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "`n💾 Total installer content: $([math]::Round($totalSize, 2)) MB"
          
          Write-Host "`n🎯 Installer preparation completed successfully"

      - name: Install Inno Setup
        if: steps.cache-inno.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $innoVersion = "${{ env.INNO_SETUP_VERSION }}"
          $url = "https://files.jrsoftware.org/is/6/innosetup-$innoVersion.exe"
          $installerPath = "$env:TEMP\innosetup.exe"
          
          Write-Host "📥 Downloading Inno Setup $innoVersion..."
          Invoke-WebRequest -Uri $url -OutFile $installerPath
          
          Write-Host "📦 Installing Inno Setup..."
          Start-Process -FilePath $installerPath -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/SP-" -Wait

      - name: Setup Inno Setup PATH
        shell: pwsh
        run: |
          $innoPath = "${env:ProgramFiles(x86)}\Inno Setup 6"
          echo "$innoPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "INNO_PATH=$innoPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Update ISS file version
        shell: pwsh
        run: |
          $issPath = "${{ env.ISS_FILE }}"
          $version = "${{ steps.version.outputs.version }}"
          
          if (Test-Path $issPath) {
            $content = Get-Content $issPath -Raw -Encoding UTF8
          
            if ($content -match '#define MyAppVersion ".*"') {
              $content = $content -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`""
            } else {
              $content = "#define MyAppVersion `"$version`"`n" + $content
            }
          
            # Use UTF8 without BOM to avoid ISS parsing issues
            $utf8NoBom = New-Object System.Text.UTF8Encoding $false
            [System.IO.File]::WriteAllText($issPath, $content, $utf8NoBom)
          
            Write-Host "✅ Updated ISS file with version $version"
          } else {
            throw "ISS file not found: $issPath"
          }

      - name: Build installer
        shell: cmd
        run: |
          echo 🔨 Building GCM installer...
          "%INNO_PATH%\ISCC.exe" /Q /O"./output" "${{ env.ISS_FILE }}"
          
          if errorlevel 1 (
            echo ❌ Installer build failed!
            exit /b 1
          )
          
          echo ✅ Installer build complete!
          echo 📦 Generated files:
          dir /B output\*.exe

      - name: Generate artifact name
        id: artifact-name
        shell: pwsh
        run: |
          $shortSha = "${{ github.sha }}".Substring(0, 7)
          $config = "${{ github.event.inputs.build_configuration }}".ToLower()
          $name = "GCM-installer-${{ steps.version.outputs.version }}-$config-$shortSha"
          echo "name=$name" >> $env:GITHUB_OUTPUT
          Write-Host "📦 Artifact: $name"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact-name.outputs.name }}
          path: ./output/GCM-Setup-*.exe
          retention-days: 30
          compression-level: 6  # Good balance of speed vs size

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-failure-${{ github.run_number }}
          path: |
            **/*.log
            **/*.trx
          retention-days: 7

      - name: Build Summary
        if: always()
        shell: pwsh
        run: |
          $status = if ($env:JOB_STATUS -eq "success") { "✅ SUCCESS" } else { "❌ FAILED" }
          
          Write-Host ""
          Write-Host "========================================"
          Write-Host "           BUILD SUMMARY - $status"
          Write-Host "========================================"
          Write-Host "Version:       ${{ steps.version.outputs.version }}"
          Write-Host "Configuration: ${{ github.event.inputs.build_configuration }}"
          Write-Host "Platform:      ${{ github.event.inputs.platform }}"
          Write-Host "Artifact:      ${{ steps.artifact-name.outputs.name }}"
          Write-Host "Build #:       ${{ github.run_number }}"
          Write-Host "Commit:        ${{ github.sha }}"
          Write-Host "========================================"

  create-release:
    needs: build-and-package
    runs-on: ubuntu-latest
    if: github.event.inputs.create_release == 'true'
    timeout-minutes: 10
    
    permissions:
      contents: write
    
    steps:
      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-and-package.outputs.artifact-name }}
          path: ./installer

      - name: Create Release
        uses: softprops/action-gh-release@v2  # Use latest version
        with:
          tag_name: v${{ needs.build-and-package.outputs.version }}
          name: GCM Release ${{ needs.build-and-package.outputs.version }}
          draft: true
          prerelease: ${{ contains(needs.build-and-package.outputs.version, '-dev') }}
          files: ./installer/GCM-Setup-*.exe
          body: |
            ## 🎮 GCM Game Console Mode v${{ needs.build-and-package.outputs.version }}
            
            ### 📝 Release Notes
            ${{ github.event.inputs.release_notes }}
            
            ### 🔧 Build Information
            - **Built from:** `${{ github.sha }}`
            - **Build number:** `${{ github.run_number }}`
            - **Configuration:** ${{ github.event.inputs.build_configuration }}
            - **Platform:** ${{ github.event.inputs.platform }}
            
            ### 📥 Installation Instructions
            1. **Download** the installer below
            2. **Run as Administrator** (required for shell replacement)
            3. The installer will automatically remove old versions
            4. Launch **GCM Settings** to configure your setup
            
            ### 💻 System Requirements
            - Windows 10 (1903+) or Windows 11
            - .NET ${{ env.DOTNET_VERSION }} Runtime
            - Administrator privileges
            - 100MB+ free disk space
            
            ### 🚀 What's Included
            - **GCM Settings** - Configuration interface
            - **GCM Loader** - Console mode launcher  
            - **Controller Support** - Xbox/Generic gamepad support
            - **Audio Switching** - Automatic audio device management
            - **Flow Launcher** - Keyboard-driven app launcher
            
            ### ⚠️ Important Notes
            - **Backup your data** before installation
            - The installer **disables UAC** temporarily in gaming mode
            - **Steam/Playnite integration** requires additional setup
            - Use at your own risk - this modifies Windows shell behavior
            
            ---
            
            💬 **Need help?** Join our [Discord](https://discord.gg/xGD2GV6zS2) or check [GitHub Issues](https://github.com/toonymak1993/GameConsoleMode/issues)
          generate_release_notes: false