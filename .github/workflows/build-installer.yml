name: Build and Create Installer

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number for the installer'
        required: false
        default: '1.0.0'

env:
  SOLUTION_PATH: './GAMINGCONSOLEMODE.sln'
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: 'x64'
  DOTNET_VERSION: '8.0'
  INNO_SETUP_VERSION: '6.2.2'
  ISS_FILE: '.github/installer.iss'

jobs:
  build-and-package:
    runs-on: windows-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact-name: ${{ steps.artifact-name.outputs.name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref }}" -like "refs/tags/v*") {
            $version = "${{ github.ref }}".Replace("refs/tags/v", "")
          } else {
            $version = "1.0.0.${{ github.run_number }}"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION_PATH }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: |
          msbuild ${{ env.SOLUTION_PATH }} `
            /p:Configuration=${{ env.BUILD_CONFIGURATION }} `
            /p:Platform="${{ env.BUILD_PLATFORM }}" `
            /p:Version=${{ steps.version.outputs.version }} `
            /p:AssemblyVersion=${{ steps.version.outputs.version }} `
            /p:FileVersion=${{ steps.version.outputs.version }} `
            /m `
            /v:m

      - name: Prepare build outputs
        shell: pwsh
        run: |
          # Create directory for installer files
          New-Item -ItemType Directory -Force -Path "./installer-files"
          
          # Copy all build outputs to installer-files directory
          # Adjust these paths based on your project structure
          $projects = @(
            "App1",
            "App2",
            "App3"
            # Add all your project names here
          )
          
          foreach ($project in $projects) {
            $sourcePath = ".//$project/bin/${{ env.BUILD_CONFIGURATION }}/*"
            $destPath = "./installer-files/$project"
          
            if (Test-Path $sourcePath) {
              New-Item -ItemType Directory -Force -Path $destPath
              Copy-Item -Path $sourcePath -Destination $destPath -Recurse -Force
              Write-Host "Copied $project files"
            } else {
              Write-Warning "Source path not found: $sourcePath"
            }
          }
          
          # List contents for debugging
          Get-ChildItem -Path "./installer-files" -Recurse | Select-Object FullName

